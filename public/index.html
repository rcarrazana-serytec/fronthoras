<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1e3a5f" />
    <meta name="description" content="Sistema de Gestión de Tareas de Contratos" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                50:  '#eff6ff',
                100: '#dbeafe',
                500: '#3b82f6',
                600: '#2563eb',
                700: '#1d4ed8',
                800: '#1e40af',
                900: '#1e3a8a',
              }
            }
          }
        }
      }
    </script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { font-family: 'Inter', sans-serif; }
      .react-select__control {
        border-radius: 0.5rem !important;
        border-color: #d1d5db !important;
        min-height: 42px !important;
      }
      .react-select__control:hover { border-color: #3b82f6 !important; }
      .react-select__control--is-focused {
        border-color: #3b82f6 !important;
        box-shadow: 0 0 0 3px rgba(59,130,246,0.15) !important;
      }
      .react-select__multi-value {
        background-color: #dbeafe !important;
        border-radius: 0.375rem !important;
      }
      .react-select__multi-value__label { color: #1e40af !important; font-size: 0.8rem !important; }
      .react-select__multi-value__remove:hover { background-color: #bfdbfe !important; color: #1e3a8a !important; }
      input[type="date"], input[type="text"], input[type="number"], select {
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      input[type="date"]:focus, input[type="text"]:focus, input[type="number"]:focus, select:focus {
        outline: none;
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
      }
      tbody tr:hover { background-color: #f8fafc; }
      .badge {
        display: inline-block;
        background: #e0f2fe;
        color: #0369a1;
        border-radius: 9999px;
        padding: 1px 8px;
        font-size: 0.72rem;
        font-weight: 500;
        margin: 1px;
      }
    </style>
    <title>Sistema de Tareas</title>
  </head>
  <body class="bg-slate-100">
    <noscript>Necesitás habilitar JavaScript para usar esta app.</noscript>
    <div id="root"></div>
  </body>
</html>
